<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Portal | Catalyst Education</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBrPtgCAM2DxKKExfqzZFmPFZx9ByMt_zA",
            authDomain: "faculty-log-35efd.firebaseapp.com",
            projectId: "faculty-log-35efd",
            storageBucket: "faculty-log-35efd.firebasestorage.app",
            messagingSenderId: "857603228966",
            appId: "1:857603228966:web:7b6420fe4d0e241f91ede7",
            measurementId: "G-BG76MMD0SD"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('logForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('submitBtn');
                const btnText = document.getElementById('btnText');
                
                btnText.innerText = "Syncing Data...";
                btn.disabled = true;

                const formData = {
                    facultyName: document.getElementById('facultyName').value,
                    section: document.getElementById('section').value,
                    subtopic: document.getElementById('subtopic').value,
                    startTime: document.getElementById('startTime').value,
                    endTime: document.getElementById('endTime').value,
                    breakMinutes: document.getElementById('breakTime').value,
                    netHours: document.getElementById('totalHours').innerText,
                    classQuestions: document.getElementById('classQs').value,
                    hwQuestions: document.getElementById('hwQs').value,
                    softwareUsed: document.getElementById('software').value,
                    timestamp: serverTimestamp()
                };

                try {
                    await addDoc(collection(db, "faculty_logs"), formData);
                    alert("Session Logged Successfully!");
                    e.target.reset();
                    document.getElementById('totalHours').innerText = "0.00 hrs";
                    updateSubtopics("");
                } catch (error) {
                    alert("Error connecting to cloud.");
                } finally {
                    btnText.innerText = "Submit Faculty Log";
                    btn.disabled = false;
                }
            });
        });
    </script>

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(rgba(248, 250, 252, 0.8), rgba(248, 250, 252, 0.8)), 
                        url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1920'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #1e293b;
        }

        .light-glass { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }

        input, select {
            background: rgba(255, 255, 255, 0.9) !important;
            border: 1px solid #e2e8f0 !important;
            color: #1e293b !important;
            height: 54px; /* Taller touch targets for mobile */
        }

        input:focus, select:focus {
            border-color: #6366f1 !important;
            ring: 2px;
            ring-color: #6366f1;
            outline: none;
        }

        label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-left: 4px;
        }

        .duration-card {
            background: rgba(99, 102, 241, 0.05);
            border: 1px dashed rgba(99, 102, 241, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center py-10 px-4">

    <div class="max-w-2xl w-full light-glass rounded-[2.5rem] overflow-hidden">
        <div class="pt-10 pb-6 text-center border-b border-slate-200/50">
            <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">FACULTY PORTAL</h1>
            <p class="text-indigo-600 text-[10px] font-black mt-1 uppercase tracking-[0.3em]">Catalyst Education</p>
        </div>

        <form id="logForm" class="p-6 md:p-10 space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div class="flex flex-col">
                    <label class="mb-2">Your Name</label>
                    <select id="facultyName" required class="w-full px-4 rounded-2xl shadow-sm">
                        <option value="">Choose...</option>
                        <option value="Fadil">Fadil</option>
                        <option value="Yasar">Yasar</option>
                        <option value="Yadu">Yadu</option>
                    </select>
                </div>
                <div class="flex flex-col">
                    <label class="mb-2">Session Section</label>
                    <select id="section" required onchange="updateSubtopics(this.value)" class="w-full px-4 rounded-2xl shadow-sm">
                        <option value="">Choose Section...</option>
                        <option value="Part 1 Sec A">Part 1 Sec A</option>
                        <option value="Part 1 Sec B">Part 1 Sec B</option>
                    </select>
                </div>
            </div>

            <div id="subtopicContainer" class="flex flex-col">
                <label class="mb-2">Subtopic Covered</label>
                <input type="text" id="subtopic" required placeholder="Select section first..." class="w-full px-4 rounded-2xl shadow-sm" disabled>
            </div>

            <div class="p-6 rounded-3xl duration-card">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-indigo-600 font-bold text-[10px] uppercase tracking-widest">Duration Calculation</h3>
                    <div class="text-right">
                        <span id="totalHours" class="text-2xl font-black text-slate-900">0.00 hrs</span>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                    <div class="flex flex-col">
                        <label class="mb-1 text-[9px] text-indigo-400">Start Time</label>
                        <input type="time" id="startTime" required class="time-trigger w-full px-4 rounded-xl shadow-sm border-none">
                    </div>
                    <div class="flex flex-col">
                        <label class="mb-1 text-[9px] text-indigo-400">End Time</label>
                        <input type="time" id="endTime" required class="time-trigger w-full px-4 rounded-xl shadow-sm border-none">
                    </div>
                    <div class="flex flex-col">
                        <label class="mb-1 text-[9px] text-indigo-400">Break (Mins)</label>
                        <input type="number" id="breakTime" value="0" class="time-trigger w-full px-4 rounded-xl shadow-sm border-none">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="flex flex-col">
                    <label class="mb-2">Class Qns</label>
                    <input type="number" id="classQs" placeholder="0" class="w-full px-4 rounded-2xl shadow-sm">
                </div>
                <div class="flex flex-col">
                    <label class="mb-2">HW Qns</label>
                    <input type="number" id="hwQs" placeholder="0" class="w-full px-4 rounded-2xl shadow-sm">
                </div>
                <div class="flex flex-col">
                    <label class="mb-2">Software</label>
                    <input type="text" id="software" placeholder="e.g. Excel" class="w-full px-4 rounded-2xl shadow-sm">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full py-5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl shadow-lg shadow-indigo-200 transition-all active:scale-95 uppercase tracking-widest text-xs mt-4">
                <span id="btnText">Submit Faculty Log</span>
            </button>
        </form>
    </div>

    <script>
        window.updateSubtopics = function(val) {
            const container = document.getElementById('subtopicContainer');
            const label = `<label class="mb-2">Subtopic Covered</label>`;
            if (val === "Part 1 Sec A") {
                container.innerHTML = `${label}
                    <select id="subtopic" required class="w-full px-4 rounded-2xl shadow-sm outline-none">
                        <option value="">-- Select Accounting Topic --</option>
                        <option value="Income statement">1. Income statement</option>
                        <option value="Balance sheet">2. Balance sheet</option>
                    </select>`;
            } else if (val === "Part 1 Sec B") {
                container.innerHTML = `${label}
                    <input type="text" id="subtopic" required placeholder="Enter topic for Sec B" class="w-full px-4 rounded-2xl shadow-sm outline-none">`;
            } else {
                container.innerHTML = `${label}
                    <input type="text" id="subtopic" required placeholder="Select a section first..." class="w-full px-4 rounded-2xl shadow-sm outline-none" disabled>`;
            }
        };

        document.body.addEventListener('input', (e) => {
            if (e.target.classList.contains('time-trigger')) {
                const start = document.getElementById('startTime').value;
                const end = document.getElementById('endTime').value;
                const breakMin = parseInt(document.getElementById('breakTime').value) || 0;

                if (start && end) {
                    const sTime = new Date(`2000-01-01T${start}`);
                    const eTime = new Date(`2000-01-01T${end}`);
                    let diff = (eTime - sTime) / 60000;
                    if (diff < 0) diff += 1440;
                    const netMinutes = Math.max(0, diff - breakMin);
                    document.getElementById('totalHours').innerText = (netMinutes / 60).toFixed(2) + " hrs";
                }
            }
        });
    </script>
</body>
</html>
