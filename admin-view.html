<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Faculty Audit | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. PASSWORD GATE
        const pass = prompt("Enter Administrator Password:");
        if (pass !== "1122") { 
            alert("Unauthorized Access");
            document.body.innerHTML = "<div class='h-screen flex items-center justify-center bg-gray-100 text-red-500 font-bold text-2xl'>ACCESS DENIED</div>";
        }

        const firebaseConfig = {
            apiKey: "AIzaSyBrPtgCAM2DxKKExfqzZFmPFZx9ByMt_zA",
            authDomain: "faculty-log-35efd.firebaseapp.com",
            projectId: "faculty-log-35efd",
            storageBucket: "faculty-log-35efd.firebasestorage.app",
            messagingSenderId: "857603228966",
            appId: "1:857603228966:web:7b6420fe4d0e241f91ede7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allLogs = [];
        const facultyList = ["Fadil", "Yasar", "Yadu"];

        const q = query(collection(db, "faculty_logs"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            allLogs = [];
            snapshot.forEach(doc => allLogs.push({id: doc.id, ...doc.data()}));
            updateDashboard();
        });

        window.showFacultyDetails = (name) => {
            const filtered = allLogs.filter(log => log.facultyName === name);
            document.getElementById('facultyMenu').classList.add('hidden');
            document.getElementById('detailView').classList.remove('hidden');
            document.getElementById('detailTitle').innerText = name + "'s Detailed Audit";
            
            const tableBody = document.getElementById('detailTable');
            tableBody.innerHTML = "";
            let totalHrs = 0;

            filtered.forEach(log => {
                totalHrs += parseFloat(log.netHours) || 0;
                tableBody.innerHTML += `
                    <tr class="border-b hover:bg-slate-50 transition text-xs">
                        <td class="p-3 font-bold text-slate-700">${log.timestamp?.toDate().toLocaleDateString() || 'N/A'}</td>
                        <td class="p-3 text-indigo-600 font-bold">${log.section}</td>
                        <td class="p-3">${log.subtopic}</td>
                        <td class="p-3">${log.startTime} - ${log.endTime}</td>
                        <td class="p-3 font-black text-slate-900">${log.netHours}</td>
                        <td class="p-3 bg-blue-50 text-center font-bold text-blue-700">${log.classQuestions || 0}</td>
                        <td class="p-3 bg-green-50 text-center font-bold text-green-700">${log.hwQuestions || 0}</td>
                        <td class="p-3 text-slate-500 uppercase font-bold">${log.softwareUsed || '-'}</td>
                    </tr>
                `;
            });
            document.getElementById('facultyTotal').innerText = totalHrs.toFixed(2) + " hrs";
        };

        window.goBack = () => {
            document.getElementById('facultyMenu').classList.remove('hidden');
            document.getElementById('detailView').classList.add('hidden');
        };

        function updateDashboard() {
            facultyList.forEach(name => {
                const count = allLogs.filter(log => log.facultyName === name).length;
                const element = document.getElementById(`count-${name}`);
                if(element) element.innerText = count + " sessions logged";
            });
        }
    </script>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <nav class="bg-slate-900 text-white py-4 px-8 shadow-2xl mb-8">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter italic">CATALYST EDUCATION FACULTY REPORT</h1>
            <div class="flex gap-4">
                 <button onclick="window.print()" class="text-[10px] bg-slate-800 border border-slate-700 px-4 py-2 rounded-lg hover:bg-slate-700 transition font-bold uppercase">Print PDF</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4">
        
        <div id="facultyMenu" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div onclick="showFacultyDetails('Fadil')" class="group cursor-pointer bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hover:border-indigo-500 transition-all">
                <h2 class="text-xl font-black text-slate-800">Fadil</h2>
                <p id="count-Fadil" class="text-slate-400 text-xs mt-1 italic font-medium">Loading...</p>
                <div class="mt-4 h-1 w-full bg-slate-100 rounded-full overflow-hidden">
                    <div class="h-full bg-indigo-500 w-1/3 group-hover:w-full transition-all duration-500"></div>
                </div>
            </div>
            <div onclick="showFacultyDetails('Yasar')" class="group cursor-pointer bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hover:border-emerald-500 transition-all">
                <h2 class="text-xl font-black text-slate-800">Yasar</h2>
                <p id="count-Yasar" class="text-slate-400 text-xs mt-1 italic font-medium">Loading...</p>
                <div class="mt-4 h-1 w-full bg-slate-100 rounded-full overflow-hidden">
                    <div class="h-full bg-emerald-500 w-1/3 group-hover:w-full transition-all duration-500"></div>
                </div>
            </div>
            <div onclick="showFacultyDetails('Yadu')" class="group cursor-pointer bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hover:border-orange-500 transition-all">
                <h2 class="text-xl font-black text-slate-800">Yadu</h2>
                <p id="count-Yadu" class="text-slate-400 text-xs mt-1 italic font-medium">Loading...</p>
                <div class="mt-4 h-1 w-full bg-slate-100 rounded-full overflow-hidden">
                    <div class="h-full bg-orange-500 w-1/3 group-hover:w-full transition-all duration-500"></div>
                </div>
            </div>
        </div>

        <div id="detailView" class="hidden">
            <button onclick="goBack()" class="mb-4 text-xs font-bold text-slate-400 hover:text-slate-900 transition">← BACK TO SELECTOR</button>
            
            <div class="bg-white rounded-2xl shadow-2xl border border-slate-200 overflow-hidden">
                <div class="p-6 bg-slate-50 border-b flex justify-between items-center">
                    <h2 id="detailTitle" class="text-xl font-black text-slate-800 uppercase tracking-tight">Report</h2>
                    <div class="text-right">
                        <span class="text-[10px] block font-bold text-slate-400 uppercase">Grand Total</span>
                        <span id="facultyTotal" class="text-2xl font-black text-indigo-600">0.00 hrs</span>
                    </div>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-100 text-slate-500 text-[9px] uppercase tracking-widest font-black border-b">
                                <th class="p-3">Date</th>
                                <th class="p-3">Section</th>
                                <th class="p-3">Subtopic</th>
                                <th class="p-3">Time Slot</th>
                                <th class="p-3">Net Hrs</th>
                                <th class="p-3 text-center">Class Qns</th>
                                <th class="p-3 text-center">HW Qns</th>
                                <th class="p-3">Software</th>
                            </tr>
                        </thead>
                        <tbody id="detailTable"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

</body>
</html>
